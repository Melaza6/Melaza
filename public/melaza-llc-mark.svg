<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Melaza LLC tree mark</title>
  <desc id="desc">A tree icon with an afro-like leaf crown and branches forming an M.</desc>
  <defs>
    <linearGradient id="leaf" x1="200" x2="800" y1="120" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#351657"/>
