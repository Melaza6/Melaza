      .branch { fill: none; stroke: url(#branch); stroke-width: 27; stroke-linecap: round; stroke-linejoin: round; }
      .line { fill: none; stroke: #fff9df; stroke-width: 11; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
