<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Melaza LLC logo</title>
  <desc id="desc">A tree logo with an afro-like crown of leaves and branches forming an M for Melaza.</desc>
  <defs>
    <radialGradient id="sun" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fff3bc"/>
      <stop offset="48%" stop-color="#c99b37"/>
      <stop offset="100%" stop-color="#7b5219"/>
    </radialGradient>
    <linearGradient id="leaf" x1="250" x2="960" y1="175" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#351657"/>
      <stop offset="56%" stop-color="#19072f"/>
      <stop offset="100%" stop-color="#070212"/>
    </linearGradient>
    <linearGradient id="branch" x1="382" x2="818" y1="430" y2="910" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff8df"/>
      <stop offset="42%" stop-color="#b98b3a"/>
      <stop offset="100%" stop-color="#3f1b5b"/>
    </linearGradient>
    <linearGradient id="goldText" x1="180" x2="1020" y1="945" y2="1110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8e7a2"/>
      <stop offset="50%" stop-color="#bd8b2f"/>
      <stop offset="100%" stop-color="#6c4713"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12051f" flood-opacity=".35"/>
    </filter>
    <style>
      .leaf { fill: url(#leaf); stroke: #0b0614; stroke-width: 5; }
      .branch { fill: none; stroke: url(#branch); stroke-width: 30; stroke-linecap: round; stroke-linejoin: round; }
      .branch-dark { fill: none; stroke: #19072f; stroke-width: 52; stroke-linecap: round; stroke-linejoin: round; }
      .branch-light { fill: none; stroke: #fff9df; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
      .word { fill: url(#goldText); font-family: Georgia, "Times New Roman", serif; font-weight: 800; letter-spacing: 18px; }
      .sub { fill: #2a153d; font-family: Arial, Helvetica, sans-serif; font-size: 52px; font-weight: 700; letter-spacing: 15px; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="#f8f0d5"/>
  <circle cx="600" cy="440" r="438" fill="url(#sun)" opacity=".38"/>

  <g filter="url(#shadow)">
    <g aria-label="afro leaf crown">
      <circle class="leaf" cx="600" cy="325" r="128"/>
      <circle class="leaf" cx="480" cy="356" r="118"/>
      <circle class="leaf" cx="720" cy="356" r="118"/>
      <circle class="leaf" cx="383" cy="430" r="112"/>
      <circle class="leaf" cx="817" cy="430" r="112"/>
      <circle class="leaf" cx="332" cy="550" r="104"/>
      <circle class="leaf" cx="868" cy="550" r="104"/>
      <circle class="leaf" cx="433" cy="618" r="112"/>
      <circle class="leaf" cx="600" cy="642" r="128"/>
      <circle class="leaf" cx="767" cy="618" r="112"/>
      <circle class="leaf" cx="503" cy="238" r="84"/>
      <circle class="leaf" cx="697" cy="238" r="84"/>
      <circle class="leaf" cx="375" cy="316" r="82"/>
      <circle class="leaf" cx="825" cy="316" r="82"/>
      <circle class="leaf" cx="267" cy="456" r="72"/>
      <circle class="leaf" cx="933" cy="456" r="72"/>
      <circle class="leaf" cx="291" cy="659" r="64"/>
      <circle class="leaf" cx="909" cy="659" r="64"/>
    </g>

    <g aria-label="M shaped branches">
      <path class="branch-dark" d="M365 760C420 642 468 548 542 472C579 435 621 435 658 472C732 548 780 642 835 760"/>
      <path class="branch-dark" d="M600 850C598 742 599 622 600 468"/>
      <path class="branch-dark" d="M365 760C436 739 492 691 540 610L600 508L660 610C708 691 764 739 835 760"/>

      <path class="branch" d="M365 760C420 642 468 548 542 472C579 435 621 435 658 472C732 548 780 642 835 760"/>
      <path class="branch" d="M600 850C598 742 599 622 600 468"/>
      <path class="branch" d="M365 760C436 739 492 691 540 610L600 508L660 610C708 691 764 739 835 760"/>

      <path class="branch-light" d="M428 717C475 670 512 612 548 543"/>
      <path class="branch-light" d="M772 717C725 670 688 612 652 543"/>
      <path class="branch-light" d="M600 824C596 725 598 615 600 515"/>
      <path class="branch-light" d="M498 509C452 463 405 425 350 398"/>
      <path class="branch-light" d="M702 509C748 463 795 425 850 398"/>
      <path class="branch-light" d="M546 472C512 413 472 373 426 352"/>
      <path class="branch-light" d="M654 472C688 413 728 373 774 352"/>
    </g>

    <g aria-label="leaf highlights">
      <ellipse cx="486" cy="358" rx="18" ry="35" fill="#fff8df" opacity=".9" transform="rotate(42 486 358)"/>
      <ellipse cx="614" cy="319" rx="16" ry="33" fill="#fff8df" opacity=".9" transform="rotate(30 614 319)"/>
      <ellipse cx="730" cy="395" rx="18" ry="35" fill="#fff8df" opacity=".86" transform="rotate(-35 730 395)"/>
      <ellipse cx="390" cy="504" rx="16" ry="34" fill="#fff8df" opacity=".82" transform="rotate(-42 390 504)"/>
      <ellipse cx="812" cy="538" rx="16" ry="34" fill="#fff8df" opacity=".82" transform="rotate(42 812 538)"/>
      <ellipse cx="590" cy="640" rx="18" ry="38" fill="#fff8df" opacity=".88" transform="rotate(-8 590 640)"/>
      <ellipse cx="345" cy="628" rx="13" ry="28" fill="#fff8df" opacity=".72" transform="rotate(44 345 628)"/>
      <ellipse cx="855" cy="628" rx="13" ry="28" fill="#fff8df" opacity=".72" transform="rotate(-44 855 628)"/>
    </g>
  </g>

  <text class="word" x="600" y="1016" text-anchor="middle" font-size="132">MELAZA</text>
  <text class="sub" x="600" y="1088" text-anchor="middle">LLC</text>
</svg>
